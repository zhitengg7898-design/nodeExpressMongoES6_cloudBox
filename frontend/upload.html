<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Smitkumar Jayendrakumar Velani" />
    <meta
      name="description"
      content="CloudBox - Upload and manage your files"
    />
    <title>CloudBox - Upload Files</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/upload.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">☁️ CloudBox</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="upload.html" class="active">Upload</a>
        <a href="share.html">Share</a>
      </div>
    </nav>

    <main class="container">
      <h1 class="page-title">Upload Files</h1>

      <section class="upload-section">
        <form id="uploadForm" class="upload-form">
          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-content">
              <span class="drop-icon">📁</span>
              <p>Drag and drop a file here or</p>
              <button type="button" class="btn btn-primary" id="chooseFileBtn">
                Choose File
              </button>
              <input type="file" id="fileInput" name="file" hidden />
            </div>
            <div class="selected-file" id="selectedFile"></div>
          </div>

          <div class="form-group">
            <label for="description">Description (optional)</label>
            <input
              type="text"
              id="description"
              name="description"
              placeholder="Add a description for your file..."
              class="form-input"
            />
          </div>

          <button type="submit" class="btn btn-primary btn-upload">
            Upload File
          </button>
        </form>

        <div id="uploadStatus" class="upload-status hidden"></div>
      </section>

      <section class="files-section">
        <div class="files-header">
          <h2>My Files</h2>
          <span id="fileCount" class="file-count">0 files</span>
        </div>
        <div id="filesList" class="files-grid">
          <div class="loading">Loading files...</div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="modalClose">✕</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="delete-modal hidden">
      <div class="delete-modal-content">
        <div class="delete-modal-icon">🗑️</div>
        <div class="delete-modal-title">Delete File</div>
        <p class="delete-modal-desc">
          This file will be permanently deleted and cannot be recovered.
        </p>
        <div class="delete-modal-actions">
          <button class="btn btn-cancel" id="cancelDelete">Cancel</button>
          <button class="btn btn-delete-confirm" id="confirmDelete">
            Delete File
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>CloudBox ✦ CS5610 Web Development ✦ Northeastern University</p>
    </footer>

    <script type="module" src="js/upload.js"></script>
  </body>
</html>
